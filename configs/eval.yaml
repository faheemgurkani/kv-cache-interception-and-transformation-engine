datasets:
  - wikitext
  - c4

wikitext:
  name: Salesforce/wikitext
  config: wikitext-2-raw-v1
  split: test

c4:
  name: c4
  config: en
  split: validation
  streaming: true

metrics:
  - perplexity
  - memory
  - throughput

batch_size: 1
max_samples: null
perplexity_stride: 512
generated_tokens: 64
attention_fidelity_tokens: 512

# Phase 1 default; full sweeps use configs/model.yaml context_lengths
default_context_length: 512
